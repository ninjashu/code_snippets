<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTQB CTFL v4.0 • 200 Practice Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .question-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .selected { background-color: #dbeafe; border-color: #3b82f6; }
        .correct { background-color: #d1fae5; border-color: #10b981; }
        .incorrect { background-color: #fee2e2; border-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">I</div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">ISTQB CTFL v4.0</h1>
                        <p class="text-sm text-gray-500">200 Practice Questions</p>
                    </div>
                </div>
            </div>
            
            <div class="p-4">
                <button onclick="startQuiz()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-2xl flex items-center justify-center gap-2 mb-6">
                    <i class="fas fa-play"></i>
                    Start Full Quiz (Random 40)
                </button>

                <div class="mb-4">
                    <input type="text" id="searchInput" 
                           onkeyup="filterQuestions()"
                           placeholder="Search questions..." 
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- Chapters -->
            <div class="flex-1 overflow-auto px-4">
                <div onclick="showAllQuestions()" class="chapter-item flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-2xl cursor-pointer mb-1 font-medium">
                    <i class="fas fa-book"></i>
                    <span>All Questions (200)</span>
                </div>
                <div id="chaptersList"></div>
            </div>

            <div class="p-4 border-t text-xs text-gray-400 text-center">
                Built for practice • Answers with rationale
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="bg-white border-b px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h2 id="viewTitle" class="text-2xl font-semibold text-gray-800">All Questions</h2>
                    <div id="stats" class="text-sm text-gray-500"></div>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="toggleMode()" 
                            id="modeBtn"
                            class="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium flex items-center gap-2">
                        <i class="fas fa-eye"></i>
                        <span>Show Answers</span>
                    </button>
                    <button onclick="resetProgress()" 
                            class="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium flex items-center gap-2">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div id="mainContent" class="flex-1 overflow-auto p-8">
                <!-- Questions will be injected here -->
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <span class="text-blue-600 font-medium" id="quizProgress">1/40</span>
                    </div>
                    <button onclick="endQuiz()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                
                <div id="quizQuestion" class="mb-10"></div>
                
                <div id="quizOptions" class="space-y-3"></div>
            </div>
            
            <div class="border-t p-6 flex justify-between items-center bg-gray-50">
                <button onclick="prevQuestion()" id="prevBtn"
                        class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium flex items-center gap-2">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <button onclick="nextQuestion()" id="nextBtn"
                        class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-medium flex items-center gap-2">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Questions data from the JS file
        const questions = [

    // =====================================================================
    // CHAPTER 1: Fundamentals of Testing (Q1-35)
    // =====================================================================
    {
        ch: 1, q: "Which of the following BEST describes a valid test objective?",
        opts: ["a) To prove the software has no defects", "b) To reduce risk and build confidence in quality", "c) To find all possible bugs before release", "d) To verify every line of code is executed"],
        ans: "b", lo: "FL-1.1.1",
        rationale: "Testing cannot prove absence of defects. A key objective is reducing risk and building confidence in quality."
    },

    {
        ch: 1, q: "A developer fixes a defect and hands the build back to the tester. The tester re-runs the test case that originally found the defect. This is an example of:",
        opts: ["a) Regression testing", "b) Confirmation testing", "c) Exploratory testing", "d) Component testing"],
        ans: "b", lo: "FL-1.1.2",
        rationale: "Confirmation testing (re-testing) verifies that a specific defect has been fixed."
    },

    {
        ch: 1, q: "Which of the following is the BEST example of the 'absence-of-errors fallacy' testing principle?",
        opts: ["a) A system passes all tests but fails to meet user needs", "b) A system has no defects in the login module but has many in payment", "c) A team finds no bugs in the final sprint", "d) A tester cannot find any more defects after extensive testing"],
        ans: "a", lo: "FL-1.3.1",
        rationale: "Finding and fixing defects is useless if the system doesn't meet user needs — the absence-of-errors fallacy."
    },

    {
        ch: 1, q: "The principle 'defects cluster together' implies that:",
        opts: ["a) All modules have an equal probability of containing defects", "b) Testing effort should be evenly spread across all modules", "c) A small number of modules contain the majority of defects", "d) Defects found together are always related"],
        ans: "c", lo: "FL-1.3.1",
        rationale: "Defect clustering (Pareto principle) shows that most defects are concentrated in a few modules."
    },

    {
        ch: 1, q: "Which of the following is NOT one of the seven testing principles?",
        opts: ["a) Early testing saves time and money", "b) Testing is context dependent", "c) Testing proves software correctness", "d) Exhaustive testing is impossible"],
        ans: "c", lo: "FL-1.3.1",
        rationale: "Testing can never prove correctness — it can only find defects. This is NOT a valid testing principle."
    },

    {
        ch: 1, q: "Which test activity involves identifying testable features and defining test conditions?",
        opts: ["a) Test implementation", "b) Test execution", "c) Test analysis", "d) Test completion"],
        ans: "c", lo: "FL-1.4.1",
        rationale: "Test analysis includes analyzing the test basis and identifying testable features and test conditions."
    },

    {
        ch: 1, q: "What is the MAIN difference between an error, a defect, and a failure?",
        opts: ["a) They are synonyms used interchangeably in testing", "b) An error is a human mistake, a defect is its manifestation in the product, a failure occurs when the defect executes", "c) A failure is found during static testing, a defect during dynamic testing", "d) An error is found in code, a defect in requirements, a failure in production"],
        ans: "b", lo: "FL-1.2.3",
        rationale: "An error (mistake) by a human causes a defect (fault) in the code; when executed under certain conditions, a defect causes a failure."
    },

    {
        ch: 1, q: "Which of the following is a consequence of the 'tests wear out' principle?",
        opts: ["a) Test cases should be deleted after each release", "b) The same tests should be run repeatedly for maximum effectiveness", "c) Test cases need to be reviewed and updated to remain effective", "d) Automated tests should be avoided as they wear out faster"],
        ans: "c", lo: "FL-1.3.1",
        rationale: "Running the same tests repeatedly finds fewer new defects over time; tests must be updated to remain effective."
    },

    {
        ch: 1, q: "A team is building a life-critical medical device. How does the testing principle 'testing is context dependent' apply?",
        opts: ["a) Less testing is needed since medical devices are well regulated", "b) More rigorous testing with formal methods is appropriate given the high risk", "c) Context has no impact; all testing should follow the same approach", "d) Only black-box testing is suitable for medical devices"],
        ans: "b", lo: "FL-1.3.1",
        rationale: "Context (safety-critical domain) determines the rigor and formality of testing required."
    },

    {
        ch: 1, q: "Which of the following BEST explains why early testing saves time and money?",
        opts: ["a) Defects found early are cheaper to fix than those found in later phases", "b) Early testing means fewer test cases need to be written", "c) Testers can skip system testing if unit testing was thorough", "d) Early testing reduces the number of developers needed"],
        ans: "a", lo: "FL-1.3.1",
        rationale: "The cost of fixing a defect increases exponentially the later it is found in the SDLC."
    },

    {
        ch: 1, q: "Which of the following activities is part of 'test planning'?",
        opts: ["a) Writing test scripts for a specific feature", "b) Determining entry and exit criteria", "c) Executing test cases against the system", "d) Identifying defects in source code"],
        ans: "b", lo: "FL-1.4.1",
        rationale: "Test planning involves determining scope, approach, resources, schedules, and entry/exit criteria."
    },

    {
        ch: 1, q: "What does 'false positive' mean in the context of testing?",
        opts: ["a) A test passes when it should have failed", "b) A test is incorrectly classified as a high-priority test", "c) A test incorrectly reports a defect that does not actually exist", "d) A tester reports a defect that was already known"],
        ans: "c", lo: "FL-1.2.3",
        rationale: "A false positive (false alarm) is when a test reports a failure but there is no actual defect."
    },

    {
        ch: 1, q: "A tester notices that running the same 50 regression tests every sprint no longer finds new defects. Which principle explains this?",
        opts: ["a) Defects cluster together", "b) Exhaustive testing is impossible", "c) Tests wear out", "d) Testing is context dependent"],
        ans: "c", lo: "FL-1.3.1",
        rationale: "Tests wear out — the same tests become ineffective at finding new defects over repeated runs."
    },

    {
        ch: 1, q: "Which of the following is an example of a 'root cause' of a defect?",
        opts: ["a) A NullPointerException thrown at runtime", "b) An ambiguous requirement misinterpreted by the developer", "c) A failing test case during system testing", "d) A missing test condition in the test plan"],
        ans: "b", lo: "FL-1.2.3",
        rationale: "Root cause is the fundamental reason for a defect — an ambiguous requirement misunderstood by the developer."
    },

    {
        ch: 1, q: "Which of the following BEST describes 'confirmation testing'?",
        opts: ["a) Testing all features after each new release", "b) Running tests to detect regressions in unchanged code", "c) Re-executing a failed test after the defect has been fixed", "d) Testing in a production-like environment"],
        ans: "c", lo: "FL-1.2.1",
        rationale: "Confirmation testing verifies that a specific previously found defect has been corrected."
    },

    {
        ch: 1, q: "Test monitoring and control is BEST described as:",
        opts: ["a) Writing test cases based on requirements", "b) Continuously tracking test progress and taking corrective actions when needed", "c) Setting up the test environment before test execution", "d) Reviewing test results after all testing is complete"],
        ans: "b", lo: "FL-1.4.1",
        rationale: "Test monitoring tracks test progress; test control takes corrective action when targets are not met."
    },

    {
        ch: 1, q: "Which of the following is an example of a test work product produced during test analysis?",
        opts: ["a) Test script", "b) Test conditions", "c) Test execution report", "d) Test summary report"],
        ans: "b", lo: "FL-1.4.1",
        rationale: "Test analysis produces test conditions — the result of analyzing the test basis."
    },

    {
        ch: 1, q: "'Exhaustive testing is impossible' because:",
        opts: ["a) Testers never have enough time", "b) The number of input combinations and states is practically infinite", "c) Requirements are always incomplete", "d) Test environments never match production exactly"],
        ans: "b", lo: "FL-1.3.1",
        rationale: "The combinatorial explosion of inputs, states, and sequences makes complete testing impractical."
    },

    {
        ch: 1, q: "Which testing activity does a tester perform when they analyze a failing test result and determine whether it represents an actual defect?",
        opts: ["a) Test planning", "b) Test analysis", "c) Test completion", "d) Test execution"],
        ans: "d", lo: "FL-1.4.1",
        rationale: "During test execution, testers compare actual results to expected results and analyze discrepancies."
    },

    {
        ch: 1, q: "Which of the following is an objective of testing?",
        opts: ["a) Proving that the software is defect-free", "b) Providing information to stakeholders for decision making", "c) Ensuring the development team writes better code", "d) Replacing manual inspection with automated checks"],
        ans: "b", lo: "FL-1.1.1",
        rationale: "A key testing objective is providing information to allow stakeholders to make informed decisions about quality."
    },

    {
        ch: 1, q: "Which of the following BEST describes the relationship between testing and quality assurance (QA)?",
        opts: ["a) Testing and QA are the same thing", "b) QA is a subset of testing focused on test execution", "c) Testing is a form of quality control; QA focuses on process improvement", "d) QA replaces testing in agile environments"],
        ans: "c", lo: "FL-1.2.2",
        rationale: "Testing (quality control) is product-oriented, finding defects. QA is process-oriented, preventing defects."
    },

    {
        ch: 1, q: "A project uses formal exit criteria that must be met before testing can be considered complete. Which test activity sets these criteria?",
        opts: ["a) Test execution", "b) Test completion", "c) Test planning", "d) Test monitoring"],
        ans: "c", lo: "FL-1.4.1",
        rationale: "Exit criteria are defined during test planning to determine when testing is sufficiently complete."
    },

    {
        ch: 1, q: "Which of the following is an example of a 'failure' as defined in software testing?",
        opts: ["a) A developer writes incorrect logic in a function", "b) A requirement contains an ambiguity", "c) An application crashes when a user submits an empty form", "d) A test case is missing an expected result"],
        ans: "c", lo: "FL-1.2.3",
        rationale: "A failure is the observable incorrect behavior of the system — the application crashing is a failure."
    },

    {
        ch: 1, q: "A test basis includes all EXCEPT:",
        opts: ["a) User stories", "b) Architecture diagrams", "c) The test execution log", "d) Business process flows"],
        ans: "c", lo: "FL-1.4.1",
        rationale: "The test execution log is a test work product, not a test basis. The test basis contains information used to design tests."
    },

    {
        ch: 1, q: "Which of the following BEST characterizes the 'shift left' approach to testing?",
        opts: ["a) Moving testers to the development team permanently", "b) Starting testing activities earlier in the SDLC", "c) Replacing system testing with unit testing", "d) Automating all test execution"],
        ans: "b", lo: "FL-1.5.2",
        rationale: "Shift left means moving testing activities earlier (to the left on the timeline) to find defects sooner."
    },

    {
        ch: 1, q: "In the context of software testing, what is a 'test oracle'?",
        opts: ["a) A tool that generates test cases automatically", "b) A means of determining the expected outcome of a test", "c) A database of previously found defects", "d) A formal specification review technique"],
        ans: "b", lo: "FL-1.1.1",
        rationale: "A test oracle is a source used to determine expected results — e.g., a specification, another system, or expert knowledge."
    },

    {
        ch: 1, q: "Which statement about the role of testing in DevOps is CORRECT?",
        opts: ["a) Testing is performed only at the end of the pipeline", "b) Testing is integrated throughout the CI/CD pipeline", "c) Manual testing replaces automated testing in DevOps", "d) Testers are not needed in DevOps teams"],
        ans: "b", lo: "FL-1.5.1",
        rationale: "In DevOps, testing is continuous and embedded throughout the CI/CD pipeline — not just at the end."
    },

    {
        ch: 1, q: "Regression testing is PRIMARILY performed to:",
        opts: ["a) Test new features added in the current release", "b) Verify that changes have not adversely affected existing functionality", "c) Find defects introduced during requirements analysis", "d) Validate performance under expected loads"],
        ans: "b", lo: "FL-1.2.1",
        rationale: "Regression testing checks that existing functionality is not broken by changes or new code."
    },

    {
        ch: 1, q: "Which of the following is a benefit of independent testing?",
        opts: ["a) Testers always find more defects than developers", "b) Independent testers can be less biased and may use a different perspective", "c) It removes the need for code reviews", "d) It reduces the overall project cost"],
        ans: "b", lo: "FL-1.5.3",
        rationale: "Independent testers bring a different perspective and are not subject to confirmation bias of the author."
    },

    {
        ch: 1, q: "What is meant by 'test completion' in the test process?",
        opts: ["a) When all test cases have been executed at least once", "b) Archiving test assets and deriving lessons learned at the end of a test phase", "c) When no more defects are found during testing", "d) Closing all defect reports in the defect tracking system"],
        ans: "b", lo: "FL-1.4.1",
        rationale: "Test completion involves collating data, archiving assets, and capturing lessons learned at end of a phase."
    },

    {
        ch: 1, q: "A defect was introduced into the code but no failure has been observed yet. Which condition is required for a failure to occur?",
        opts: ["a) The defect must be in a safety-critical module", "b) The defect must be executed under the right conditions", "c) The defect must be in a section covered by a test case", "d) The defect must be reported to the development team"],
        ans: "b", lo: "FL-1.2.3",
        rationale: "A defect only causes a failure when it is executed and the conditions trigger the faulty behavior."
    },

    {
        ch: 1, q: "Which of the following BEST explains why testing contributes to higher quality software?",
        opts: ["a) By preventing developers from writing any code with defects", "b) By detecting defects early so they can be fixed before reaching the user", "c) By ensuring 100% code coverage is achieved", "d) By replacing the need for design reviews"],
        ans: "b", lo: "FL-1.1.1",
        rationale: "Testing finds defects earlier in development, reducing the cost and impact of those defects on end users."
    },

    {
        ch: 1, q: "Which of the following is an example of a 'false negative' in testing?",
        opts: ["a) A test fails but no real defect exists", "b) A test passes even though an actual defect is present", "c) A defect is found but marked as low priority incorrectly", "d) A test case is designed with incorrect expected results"],
        ans: "b", lo: "FL-1.2.3",
        rationale: "A false negative is when a test passes but an actual defect exists — the test failed to detect it."
    },

    {
        ch: 1, q: "Which of the following is the PRIMARY purpose of retrospectives in the testing process?",
        opts: ["a) To formally close all open defects", "b) To identify lessons learned and improve future processes", "c) To get sign-off from stakeholders on test completion", "d) To archive test cases for future use"],
        ans: "b", lo: "FL-1.4.1",
        rationale: "Retrospectives capture lessons learned to improve quality and efficiency in future iterations or projects."
    },

    {
        ch: 1, q: "What distinguishes dynamic testing from static testing?",
        opts: ["a) Static testing requires tools; dynamic testing does not", "b) Dynamic testing executes the code; static testing does not", "c) Static testing is done by testers; dynamic testing by developers", "d) Dynamic testing is always automated; static testing is always manual"],
        ans: "b", lo: "FL-1.2.1",
        rationale: "Dynamic testing runs the software to observe its behavior; static testing examines artifacts without executing code."
    },

    // =====================================================================
    // CHAPTER 2: Testing Throughout the SDLC (Q36-70)
    // =====================================================================
    {
        ch: 2, q: "In which SDLC model does the rule 'for every development activity there is a corresponding test activity' apply?",
        opts: ["a) Only in sequential models like Waterfall", "b) Only in iterative models like Scrum", "c) In all SDLC models", "d) Only in incremental models"],
        ans: "c", lo: "FL-2.1.1",
        rationale: "The principle that every development activity has a corresponding test activity applies in all SDLC models."
    },

    {
        ch: 2, q: "What is the PRIMARY difference between component testing and component integration testing?",
        opts: ["a) Component testing uses stubs; integration testing does not", "b) Component testing tests a single component in isolation; integration testing tests interactions between components", "c) Component testing is performed by developers; integration testing by testers", "d) Component testing is always automated; integration testing is always manual"],
        ans: "b", lo: "FL-2.2.1",
        rationale: "Component testing isolates individual components; component integration testing examines their interactions."
    },

    {
        ch: 2, q: "Which test level is MOST concerned with verifying that the complete, integrated system meets specified requirements?",
        opts: ["a) Component testing", "b) Component integration testing", "c) System testing", "d) Acceptance testing"],
        ans: "c", lo: "FL-2.2.3",
        rationale: "System testing verifies the behavior of the fully integrated system against specified requirements."
    },

    {
        ch: 2, q: "Which acceptance testing type involves the end users testing the system in a real or simulated production environment?",
        opts: ["a) Alpha testing", "b) Beta testing", "c) Contract acceptance testing", "d) Regulatory acceptance testing"],
        ans: "a", lo: "FL-2.2.4",
        rationale: "Alpha testing is performed by end users (or representatives) at the developer's site before release."
    },

    {
        ch: 2, q: "In Test-Driven Development (TDD), tests are written:",
        opts: ["a) After the code is written and reviewed", "b) Before the code is written, to drive implementation", "c) Only for regression testing purposes", "d) Exclusively by QA engineers, not developers"],
        ans: "b", lo: "FL-2.1.3",
        rationale: "In TDD, tests (unit tests) are written first, then the minimal code to pass them, then refactored."
    },

    {
        ch: 2, q: "Which of the following BEST describes Behavior-Driven Development (BDD)?",
        opts: ["a) Tests are written based on code structure", "b) Stakeholders collaborate using natural language (Given/When/Then) to specify behavior", "c) Behavior testing replaces unit testing", "d) BDD is only applicable to agile projects"],
        ans: "b", lo: "FL-2.1.3",
        rationale: "BDD uses natural language scenarios (Given/When/Then) to describe expected behavior, fostering collaboration."
    },

    {
        ch: 2, q: "What is the MAIN purpose of a test environment?",
        opts: ["a) To store test cases and test results", "b) To provide a stable, controlled environment in which software can be tested", "c) To automate test execution", "d) To train new testers on the system"],
        ans: "b", lo: "FL-2.3.1",
        rationale: "A test environment provides the infrastructure (hardware, software, data) needed to execute tests reliably."
    },

    {
        ch: 2, q: "In the V-model, component integration testing corresponds to which development phase?",
        opts: ["a) System design", "b) High-level design", "c) Detailed design", "d) Architecture design"],
        ans: "d", lo: "FL-2.1.1",
        rationale: "In the V-model, component integration testing verifies the system/software architecture (integration level design)."
    },

    {
        ch: 2, q: "Which of the following is a NON-functional test type?",
        opts: ["a) Boundary value analysis testing", "b) Security testing", "c) Decision table testing", "d) Regression testing"],
        ans: "b", lo: "FL-2.3.2",
        rationale: "Security testing is non-functional — it tests a quality characteristic (security), not specific functional behavior."
    },

    {
        ch: 2, q: "Beta testing differs from alpha testing in that beta testing is:",
        opts: ["a) Performed by developers in a controlled environment", "b) Done by end users in their own environment without the development team present", "c) More structured and scripted than alpha testing", "d) Only applicable to open-source software"],
        ans: "b", lo: "FL-2.2.4",
        rationale: "Beta testing involves end users testing in their real environment, without developer oversight."
    },

    {
        ch: 2, q: "Which statement about testing in Agile/Scrum is CORRECT?",
        opts: ["a) Testing is performed only at the end of each sprint", "b) Testers are not part of the Scrum team", "c) Testers collaborate throughout the sprint, including during planning and review", "d) Regression testing is eliminated because of continuous integration"],
        ans: "c", lo: "FL-2.1.2",
        rationale: "In Agile, testers participate throughout the sprint — in planning, development, daily standups, and review."
    },

    {
        ch: 2, q: "What is the MAIN purpose of acceptance test-driven development (ATDD)?",
        opts: ["a) To ensure 100% code coverage", "b) To create acceptance criteria before development to drive implementation", "c) To replace system testing with acceptance testing", "d) To document defects found during UAT"],
        ans: "b", lo: "FL-2.1.3",
        rationale: "ATDD defines acceptance tests upfront, before development, to clarify requirements and drive implementation."
    },

    {
        ch: 2, q: "Which test level PRIMARILY focuses on defects in the interfaces and interactions between integrated components?",
        opts: ["a) Component testing", "b) Component integration testing", "c) System testing", "d) Acceptance testing"],
        ans: "b", lo: "FL-2.2.2",
        rationale: "Component integration testing focuses on the interfaces and interactions between components."
    },

    {

            showAnswers = !showAnswers;
            document.getElementById('modeBtn').innerHTML = showAnswers ? 
                `<i class="fas fa-eye-slash"></i><span>Hide Answers</span>` : 
                `<i class="fas fa-eye"></i><span>Show Answers</span>`;
            
            if (currentFilter === 'all') renderQuestions(questions);
            else renderQuestions(questions.filter(q => q.ch === currentFilter));
        }
        
        function selectOption(el, qIndex, selected) {
            // For future tracking if needed
            console.log(`Selected ${selected} for question ${qIndex+1}`);
            // Highlight
            el.parentElement.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
        }
        
        // Quiz Functions
        function startQuiz() {
            currentQuiz = [...questions].sort(() => Math.random() - 0.5).slice(0, 40);
            currentQuizIndex = 0;
            userAnswers = {};
            document.getElementById('quizModal').classList.remove('hidden');
            showQuizQuestion();
        }
        
        function showQuizQuestion() {
            const q = currentQuiz[currentQuizIndex];
            const qNum = currentQuizIndex + 1;
            
            document.getElementById('quizProgress').textContent = `${qNum}/40`;
            
            let html = `
                <div class="flex gap-3 mb-6">
                    <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-2xl text-sm font-medium">${q.lo}</span>
                </div>
                <p class="text-xl leading-relaxed text-gray-800">${q.q}</p>
            `;
            document.getElementById('quizQuestion').innerHTML = html;
            
            let optsHtml = '';
            q.opts.forEach((opt, i) => {
                const letter = String.fromCharCode(97 + i);
                optsHtml += `
                    <div onclick="answerQuiz('${letter}')" 
                         class="option border border-gray-200 hover:border-blue-400 rounded-2xl p-5 cursor-pointer flex gap-4 items-center">
                        <div class="w-8 h-8 rounded-2xl border-2 border-gray-300 flex items-center justify-center font-semibold text-lg">${letter.toUpperCase()}</div>
                        <div>${opt}</div>
                    </div>
                `;
            });
            document.getElementById('quizOptions').innerHTML = optsHtml;
        }
        
        function answerQuiz(letter) {
            userAnswers[currentQuizIndex] = letter;
            nextQuestion();
        }
        
        function nextQuestion() {
            if (currentQuizIndex < currentQuiz.length - 1) {
                currentQuizIndex++;
                showQuizQuestion();
            } else {
                showQuizResults();
            }
        }
        
        function prevQuestion() {
            if (currentQuizIndex > 0) {
                currentQuizIndex--;
                showQuizQuestion();
            }
        }
        
        function endQuiz() {
            if (confirm("End the quiz? Your progress will be lost.")) {
                document.getElementById('quizModal').classList.add('hidden');
            }
        }
        
        function showQuizResults() {
            let score = 0;
            currentQuiz.forEach((q, i) => {
                if (userAnswers[i] === q.ans) score++;
            });
            
            const percentage = Math.round((score / 40) * 100);
            
            let html = `
                <div class="text-center py-12">
                    <div class="text-6xl font-bold mb-2 ${percentage >= 65 ? 'text-green-600' : 'text-orange-600'}">${percentage}%</div>
                    <div class="text-xl text-gray-600 mb-8">${score} out of 40 correct</div>
                    <div class="text-lg ${percentage >= 65 ? 'text-green-600' : 'text-red-600'} font-medium mb-10">
                        ${percentage >= 65 ? '🎉 You would PASS the real exam!' : 'Keep practicing!'}
                    </div>
                    
                    <button onclick="restartQuiz()" 
                            class="px-10 py-4 bg-blue-600 text-white rounded-2xl text-lg font-medium">
                        Try Another Quiz
                    </button>
                </div>
            `;
            
            document.getElementById('quizQuestion').innerHTML = html;
            document.getElementById('quizOptions').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'none';
        }
        
        function restartQuiz() {
            document.getElementById('quizModal').classList.add('hidden');
            setTimeout(() => startQuiz(), 300);
        }
        
        function resetProgress() {
            if (confirm("Reset all progress?")) {
                showAllQuestions();
            }
        }
        
        // Initialize
        window.onload = function() {
            // In a real implementation, questions array would be fully populated here
            // For demo purposes:
            console.log("ISTQB CTFL Practice loaded. Total questions:", questions.length);
            renderChapters();
            showAllQuestions();
        };
    </script>
</body>
</html>
